<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Joyeux anniversaire ❤️</title>

    <!-- Police -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Feux d'artifice -->
    <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2/dist/index.umd.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========================= -->
    <!-- DIAPORAMA -->
    <!-- ========================= -->

    <div id="slideshow"></div>

    <!-- Couche sombre -->
    <div id="overlay"></div>

    <!-- Etoiles -->
    <div id="stars"></div>

    <!-- ========================= -->
    <!-- ECRAN D'ACCUEIL -->
    <!-- ========================= -->

    <section id="startScreen">

        <div id="heart">❤️</div>

        <h1>
            J'ai préparé quelque chose pour toi...
        </h1>

        <p>
            Touche l'écran pour commencer.
        </p>

        <button id="startBtn">
            Commencer
        </button>

    </section>

    <!-- ========================= -->
    <!-- PRESENTATION -->
    <!-- ========================= -->

    <section id="storySection">

        <p id="storyText"></p>

    </section>

    <!-- ========================= -->
    <!-- VIDEO -->
    <!-- ========================= -->

    <section id="videoSection">

        <video
            id="birthdayVideo"
            playsinline
            preload="auto">

            <source src="Snapchat-1493829610.mp4" type="video/mp4">

        </video>

    </section>

    <!-- ========================= -->
    <!-- ANNIVERSAIRE -->
    <!-- ========================= -->

    <section id="birthdaySection">

        <h1 id="birthdayTitle">
            JOYEUX ANNIVERSAIRE
            <br>
            HOUÉFA ❤️
        </h1>

        <div id="fireworks"></div>

    </section>

    <!-- ========================= -->
    <!-- CONTINUER -->
    <!-- ========================= -->

    <section id="continueSection">

        <button id="continueBtn">

            Continuer l'aventure ?

        </button>

    </section>

    <!-- ========================= -->
    <!-- MESSAGE FINAL -->
    <!-- ========================= -->

    <section id="loveSection">

        <h1>

            Je t'aime.

        </h1>

        <h2>

            Plus que tu ne l'imagines.

            ❤️

        </h2>

    </section>

    <!-- ========================= -->
    <!-- MUSIQUE (INVISIBLE) -->
    <!-- ========================= -->

    <audio
        id="music"
        loop
        preload="auto">

        <source src="Simi ft Adekunle Gold _ Deja - Happy Birthday(M4A_128K).m4a" type="audio/mp4">

    </audio>

    <script src="script.js"></script>

</body>

  </html>
